name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Login Dockerhub
      env:
        DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
        DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
      run: echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
      #run: docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD  
      
    - name: Build the Docker image
      run: docker build -t timothyfudocker/loadtxtwebapp:latest .
      
    - name: Tag the Docker image with v1.3
      run: docker tag timothyfudocker/loadtxtwebapp:latest timothyfudocker/loadtxtwebapp:v1.3

    - name: Push the Docker image (latest tag)
      run: docker push timothyfudocker/loadtxtwebapp:latest

    - name: Push the Docker image (v1.3 tag)
      run: docker push timothyfudocker/loadtxtwebapp:v1.3