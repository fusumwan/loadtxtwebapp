<script>
    var contextPath = "{{ contextPath }}";
</script>
<div id="banner" class="banner banner_large">
    <div class="header">
        <!--
        The safe filter tells Jinja2 that this string contains HTML that should not be escaped. This is important because, without it, the HTML tag would be rendered as a plain string, not as part of the HTML document.
        -->
        {{ csrf_token_element | safe }}
        <!-- container-for-Head-Nav -->
        <div class="container">
            <div class="logo">
                <a href="/index"><img src="{{ url_for('static', path='images/logo.png') }}" class="img-responsive"
                        alt="" /></a>
            </div>
            <!-- script-for-nav -->
            <div class="head-nav">
                <span class="menu"> </span>
                <ul>
                    <li id="home_li"><a href="/index">Home</a></li>
                    <li id="login_li"><a href="/login">Login</a></li>
                    <li id="logout_li" style="display:none"><a href="/logout">Logout</a></li>
                    <li id="sign_up_li"><a href="/signup">Sign Up</a></li>
                </ul>
                <div class="clearfix"></div>
            </div>
            <div class="clearfix"> </div>
        </div>
    </div>
    <!-- end of container-for-Head-Nav -->
    <!-- container-search -->
    <div id="search-container" class="container">
        <div class="search-container">
            <article>
                <form>
                    <div class="banner-info">
                        <div class="col info">
                            <h1 id="search-title" class="search-title">Find your restaurant for ordering table</h1>
                            <input id="search_criteria_1_txt" name="search_criteria_1_txt"
                                class="form-input margin-bottom search-container-input"
                                placeholder="Enter Search Criteria*" type="text">
                            <select id="search_criteria_2_drp" name="search_criteria_2_drp"
                                class="form-select search-container-select" aria-label="party size">
                                <option value="1">Criteria Value 1</option>
                            </select>
                            <a id="search_btn" class="normal_button" href="#">Search</a>
                        </div>
                        <div class="clearfix"></div>
                    </div>
                </form>
            </article>
        </div>
    </div>
    <!-- end of container-search -->
</div>
